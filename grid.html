<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Coffee Shop – Registrations</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    </style>
</head>

<body>
    <main class="container py-5">
        <div class="d-flex align-items-center justify-content-between mb-3">
            <h1 class="page-title fw-bold mb-0">Registered Customers</h1>
            <a href="index.html" class="btn btn-back">+ New Registration</a>
        </div>
        <p class="mb-4 opacity-75">Live data from Firebase Realtime Database — updates automatically.</p>

        <div class="table-card">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>First Name</th>
                            <th>Last Name</th>
                            <th>Email</th>
                            <th>Age</th>
                            <th>Address</th>
                            <th>Favourite Coffee</th>
                            <th>Notes</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr class="spinner-row">
                            <td colspan="8" class="text-center py-4">
                                <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                                Loading data from Firebase…
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <p class="mt-3 opacity-50 small text-end" id="recordCount"></p>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe"
        crossorigin="anonymous"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDX0GT8W96QJbxY9vlETrAQoQiilqeYonk",
            authDomain: "mycofeeshop-dfb4a.firebaseapp.com",
            projectId: "mycofeeshop-dfb4a",
            databaseURL: "https://mycofeeshop-dfb4a-default-rtdb.europe-west1.firebasedatabase.app/",
            storageBucket: "mycofeeshop-dfb4a.firebasestorage.app",
            messagingSenderId: "765547790705",
            appId: "1:765547790705:web:928385cec58e794e72f6d0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const tbody = document.getElementById("tableBody");
        const recordCount = document.getElementById("recordCount");

        onValue(ref(db, "registrations"), (snapshot) => {
            tbody.innerHTML = "";

            if (!snapshot.exists()) {
                tbody.innerHTML = `<tr class="empty-row"><td colspan="8" class="text-center py-4">No registrations yet.</td></tr>`;
                recordCount.textContent = "";
                return;
            }

            const data = snapshot.val();
            const entries = Object.entries(data);

            entries.forEach(([key, r], index) => {
                const tr = document.createElement("tr");
                tr.innerHTML = `
          <td><span class="badge-coffee">${index + 1}</span></td>
          <td>${escHtml(r.firstName ?? "")}</td>
          <td>${escHtml(r.lastName ?? "")}</td>
          <td>${escHtml(r.email ?? "")}</td>
          <td>${escHtml(String(r.age ?? ""))}</td>
          <td>${escHtml(r.address ?? "")}</td>
          <td>${escHtml(r.favoriteCoffee ?? "")}</td>
          <td>${escHtml(r.notes ?? "")}</td>
        `;
                tbody.appendChild(tr);
            });

            recordCount.textContent = `${entries.length} record${entries.length !== 1 ? "s" : ""} loaded`;
        }, (error) => {
            tbody.innerHTML = `<tr><td colspan="8" class="text-center text-danger py-4">Error: ${escHtml(error.message)}</td></tr>`;
        });

        function escHtml(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
        }
    </script>
</body>

</html>
